<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stelno</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#eee;
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}
#box{text-align:center}
#drop{
  border:2px dashed #444;
  padding:40px;
  border-radius:14px;
  transition:.2s;
}
#drop:hover{border-color:#888}
#status{margin-top:10px;font-size:14px;color:#aaa}
progress{width:100%;margin-top:10px}
</style>

</head>
<body>

<div id="box">
  <h2>Stelno ⚡</h2>
  <div id="drop">Drop file or click</div>
  <input type="file" id="f" hidden>
  <div id="status">Initializing...</div>
  <progress id="p" value="0" max="100"></progress>
</div>

<script type="module">
/* config */
const WS = 'wss://stelno.onrender.com';
const HTTP = 'https://stelno.onrender.com';

/* room */
const r = location.hash.slice(1) || Math.random().toString(36).slice(2);
location.hash = r;

/* UI */
const s = document.getElementById('status');
const prog = document.getElementById('p');

/* state */
let dc, connected=false, fallbackMode=false;

/* socket */
const ws = new WebSocket(WS);
const q = [];

/* safe send */
const sendWS = d => {
  const m = JSON.stringify(d);
  if(ws.readyState===1) ws.send(m);
  else q.push(m);
};

ws.onopen = () => {
  sendWS({join:r});
  s.textContent = 'Waiting for peer...';

  /* flush queue */
  while(q.length) ws.send(q.shift());
};

/* webrtc */
const pc = new RTCPeerConnection({
  iceServers:[{urls:'stun:stun.l.google.com:19302'}]
});

/* auto-connect */
(async ()=>{
  dc = pc.createDataChannel('f');
  setup();

  const o = await pc.createOffer();
  await pc.setLocalDescription(o);
  sendWS({signal:o});
})();

/* fallback timer */
setTimeout(()=>{
  if(!connected){
    fallbackMode = true;
    s.textContent = 'Using secure fallback ☁️';
  }
},9000);

/* receive channel */
pc.ondatachannel = e => {
  dc = e.channel;
  setup();
};

/* ice */
pc.onicecandidate = e => {
  if(e.candidate)
    sendWS({signal:e.candidate});
};

/* signaling */
ws.onmessage = async e => {
  const d = JSON.parse(e.data);

  if(d.signal){
    if(d.signal.type==='offer'){
      await pc.setRemoteDescription(d.signal);
      const a = await pc.createAnswer();
      await pc.setLocalDescription(a);
      sendWS({signal:a});
    }
    else if(d.signal.type==='answer'){
      await pc.setRemoteDescription(d.signal);
    }
    else if(d.signal.candidate){
      await pc.addIceCandidate(d.signal);
    }
  }

  /* fallback receive */
  if(d.file){
    s.textContent = 'Receiving via fallback ☁️';

    const a = document.createElement('a');
    a.href = HTTP+'/f/'+d.file;
    a.download = 'file';
    a.click();
  }
};

/* drag/drop + clipboard FIX */
drop.onclick = async () => {
  try{
    await navigator.clipboard.writeText(location.href);
    s.textContent = 'Link copied ✓';
  }catch(e){}
  f.click();
};

drop.ondragover = e => e.preventDefault();

drop.ondrop = e => {
  e.preventDefault();
  sendFile(e.dataTransfer.files[0]);
};

f.onchange = () => sendFile(f.files[0]);

/* setup channel */
function setup(){

  dc.onopen = ()=>{
    connected = true;
    fallbackMode = false;
    s.textContent = 'Direct connection ⚡';
  };

  dc.onclose = ()=>{
    connected = false;
  };

  dc.onerror = ()=>{
    connected = false;
  };

  dc.onmessage = e => {
    s.textContent = 'Receiving via P2P ⚡';

    const blob = new Blob([e.data]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'file';
    a.click();
  };
}

/* send logic */
async function sendFile(file){
  if(!file) return;

  s.textContent='Preparing...';

  if(!connected && !fallbackMode){
    s.textContent='Connecting...';
    await new Promise(r=>setTimeout(r,2000));
  }

  s.textContent='Sending...';

  /* P2P */
  if(connected && !fallbackMode){
    const b = await file.arrayBuffer();
    dc.send(b);
    s.textContent='Sent via P2P ⚡';
  }

  /* fallback */
  else{
    s.textContent='Uploading... ☁️';

    const res = await fetch(HTTP,{
      method:'POST',
      body:file
    });

    const id = await res.text();

    sendWS({file:id});

    s.textContent='Sent via fallback ☁️';
  }
}
</script>

</body>
</html>
