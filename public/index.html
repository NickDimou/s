<script type="module">
/* config */
const WS = 'wss://stelno.onrender.com';
const HTTP = 'https://stelno.onrender.com';

/* room */
const r = location.hash.slice(1) || Math.random().toString(36).slice(2);
location.hash = r;

/* UI */
const s        = document.getElementById('status');
const prog     = document.getElementById('p');
const drop     = document.getElementById('drop');
const f        = document.getElementById('f');
const cancelBtn = document.getElementById('cancel');
const xferInfo  = document.getElementById('xfer-info');

/* ── transfer state (module-level so cancel can reset receive side too) ── */
let cancelTransfer  = false;
let receivedChunks  = [];
let expectedChunks  = 0;
let fileMeta        = null;
let rcvStartTime    = 0;   // for receive-side speed

/* ── helpers ── */
function showCancel()  { cancelBtn.style.display = 'inline-block'; }
function hideCancel()  { cancelBtn.style.display = 'none'; }
function showXferInfo(txt) { xferInfo.style.display = 'block'; xferInfo.textContent = txt; }
function hideXferInfo()    { xferInfo.style.display = 'none'; xferInfo.textContent = ''; }

function fmtSpeed(bps) {
  if (bps >= 1048576) return `${(bps / 1048576).toFixed(1)} MB/s`;
  return `${(bps / 1024).toFixed(0)} KB/s`;
}
function fmtETA(sec) {
  if (!isFinite(sec) || sec < 0) return '—';
  if (sec >= 60) return `${Math.ceil(sec / 60)}m left`;
  return `${Math.ceil(sec)}s left`;
}

/* cancel button click */
cancelBtn.onclick = () => {
  cancelTransfer = true;
  /* reset receive state in case we're on the receiving end */
  receivedChunks = [];
  expectedChunks = 0;
  fileMeta       = null;
  prog.value     = 0;
  prog.style.display = 'none';
  hideCancel();
  hideXferInfo();
  s.textContent = 'Transfer cancelled ✕';
};

/* ── socket ── */
let dc, connected = false, fallbackMode = false;
const ws = new WebSocket(WS);
const q  = [];

const sendWS = d => {
  const m = JSON.stringify(d);
  if (ws.readyState === 1) ws.send(m);
  else q.push(m);
};

ws.onopen = () => {
  sendWS({ join: r });
  s.textContent = 'Waiting for peer...';
  while (q.length) ws.send(q.shift());

  setInterval(() => {
    if (!connected) sendWS({ checkPeers: true });
  }, 5000);
};

/* ── WebRTC ── */
const pc = new RTCPeerConnection({
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
});

let makingOffer = false;
const polite    = Math.random() > 0.5;

/* setup data channel */
function setup() {
  if (!dc) return;

  dc.onopen  = () => { connected = true; fallbackMode = false; s.textContent = 'Direct connection ⚡'; };
  dc.onclose = () => { connected = false; };
  dc.onerror = () => { connected = false; };

  dc.onmessage = async e => {
    try {
      if (typeof e.data === 'string') {
        /* ── incoming file metadata ── */
        const meta     = JSON.parse(e.data);
        fileMeta       = meta;
        receivedChunks = [];
        expectedChunks = meta.chunks;
        rcvStartTime   = Date.now();
        cancelTransfer = false;

        prog.value         = 0;
        prog.style.display = 'block';   /* ← receive-side bar now visible */
        showCancel();
        s.textContent = `Receiving ${shortName(meta.name)} via P2P ⚡`;

      } else {
        /* ── binary chunk ── */
        if (cancelTransfer) return;     /* silently drop chunks after cancel */

        receivedChunks.push(e.data);
        const pct = receivedChunks.length / expectedChunks;
        prog.value = pct * 100;

        /* receive-side speed + ETA */
        const elapsed  = (Date.now() - rcvStartTime) / 1000 || 0.001;
        const rcvBytes = receivedChunks.length * 16 * 1024; /* approx */
        const speed    = rcvBytes / elapsed;
        const remaining = ((expectedChunks - receivedChunks.length) * 16 * 1024) / speed;
        showXferInfo(`↓ ${fmtSpeed(speed)}  —  ${fmtETA(remaining)}`);

        if (receivedChunks.length === expectedChunks) {
          const blob = new Blob(receivedChunks, { type: fileMeta.type });
          const a    = document.createElement('a');
          a.href     = URL.createObjectURL(blob);
          a.download = fileMeta.name;
          a.click();
          s.textContent      = `Received ${shortName(fileMeta.name)} ✅`;
          prog.value         = 0;
          prog.style.display = 'none';
          hideCancel();
          hideXferInfo();
        }
      }
    } catch (err) { console.error(err); }
  };
}

dc = pc.createDataChannel('f');
setup();

pc.onnegotiationneeded = async () => {
  try {
    makingOffer = true;
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendWS({ signal: pc.localDescription });
  } finally {
    makingOffer = false;
  }
};

pc.ondatachannel = e => { dc = e.channel; setup(); };

pc.onicecandidate = e => {
  if (!e.candidate) return;
  sendWS({ signal: e.candidate });
};

/* signaling */
ws.onmessage = async e => {
  const d = JSON.parse(e.data);

  if (d.checkPeers && !connected) {
    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendWS({ signal: pc.localDescription });
    } catch (err) { console.error(err); }
  }

  if (d.signal) {
    const offerCollision =
      d.signal.type === 'offer' &&
      (makingOffer || pc.signalingState !== 'stable');
    const ignoreOffer = !polite && offerCollision;
    if (ignoreOffer) return;

    if (d.signal.type === 'offer') {
      await pc.setRemoteDescription(d.signal);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendWS({ signal: pc.localDescription });
    } else if (d.signal.type === 'answer') {
      if (pc.signalingState !== 'have-local-offer') return;
      await pc.setRemoteDescription(d.signal);
    } else if (d.signal.candidate) {
      try { await pc.addIceCandidate(d.signal); } catch {}
    }
  }

  /* fallback receive */
  if (d.file) {
    s.textContent = 'Receiving via fallback ☁️';
    const a    = document.createElement('a');
    a.href     = HTTP + '/f/' + d.file;
    a.download = 'file';
    a.click();
  }
};

/* drag / drop / click */
drop.onclick = async () => {
  try { await navigator.clipboard.writeText(location.href); s.textContent = 'Link copied ✓'; } catch {}
  f.click();
};
drop.ondragover = e => e.preventDefault();
drop.ondrop     = e => { e.preventDefault(); for (const file of e.dataTransfer.files) sendFile(file); };
f.onchange      = () => { for (const file of f.files) sendFile(file); };

/* fallback timer */
setTimeout(() => {
  if (!connected) { fallbackMode = true; s.textContent = 'Using secure fallback ☁️'; }
}, 30000);

/* ── chunked P2P send ── */
async function sendFile(file) {
  if (!file) return;

  cancelTransfer = false;
  const chunkSize = 16 * 1024;
  const buffer    = await file.arrayBuffer();
  const chunks    = Math.ceil(buffer.byteLength / chunkSize);

  s.textContent      = 'Preparing...';
  prog.value         = 0;
  prog.style.display = 'block';
  showCancel();
  hideXferInfo();

  if (!connected && !fallbackMode) {
    s.textContent = 'Connecting...';
    await new Promise(resolve => setTimeout(resolve, 2000));
  }

  if (cancelTransfer) { prog.style.display = 'none'; hideCancel(); return; }

  s.textContent = 'Sending...';
  playSound();

  if (connected && !fallbackMode) {
    dc.send(JSON.stringify({ name: file.name, type: file.type, chunks }));

    let offset    = 0;
    let startTime = Date.now();
    let lastUI    = startTime;

    while (offset < buffer.byteLength) {
      if (cancelTransfer) {
        prog.value         = 0;
        prog.style.display = 'none';
        hideCancel();
        hideXferInfo();
        s.textContent = 'Transfer cancelled ✕';
        return;
      }
      while (dc.bufferedAmount > 16 * chunkSize) await new Promise(r => setTimeout(r, 50));

      const slice = buffer.slice(offset, offset + chunkSize);
      dc.send(slice);
      offset += chunkSize;

      prog.value = Math.min((offset / buffer.byteLength) * 100, 100);

      /* update speed/ETA at most every 300 ms */
      const now = Date.now();
      if (now - lastUI > 300) {
        const elapsed  = (now - startTime) / 1000 || 0.001;
        const speed    = offset / elapsed;                          /* bytes/s */
        const bytesLeft = buffer.byteLength - offset;
        const eta      = bytesLeft / speed;
        showXferInfo(`↑ ${fmtSpeed(speed)}  —  ${fmtETA(eta)}`);
        lastUI = now;
      }
    }

    s.textContent      = `Sent ${shortName(file.name)} via P2P ⚡`;
    prog.value         = 0;
    prog.style.display = 'none';
    hideCancel();
    hideXferInfo();

  } else {
    /* fallback HTTP upload */
    s.textContent = 'Uploading... ☁️';
    try {
      const res = await fetch(HTTP, { method: 'POST', body: file });
      const id  = await res.text();
      sendWS({ file: id });
      s.textContent = 'Sent via fallback ☁️';
    } catch {
      s.textContent = 'Upload failed ❌';
    }
    prog.value         = 0;
    prog.style.display = 'none';
    hideCancel();
    hideXferInfo();
  }
}

function shortName(name, max = 20) {
  if (name.length <= max) return name;
  const ext = name.includes('.') ? '.' + name.split('.').pop() : '';
  return name.slice(0, max - ext.length - 3) + '...' + ext;
}
</script>


<script>
  function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.75, ctx.currentTime + 0.05);
    master.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.2);
    master.connect(ctx.destination);

    const bufLen = ctx.sampleRate * 3.5;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=Math.random()*2-1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const bandpass = ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.setValueAtTime(200, ctx.currentTime);
    bandpass.frequency.exponentialRampToValueAtTime(4000, ctx.currentTime+1.0);
    bandpass.frequency.exponentialRampToValueAtTime(800, ctx.currentTime+2.0);
    bandpass.Q.value = 0.8;
    const whooshGain = ctx.createGain();
    whooshGain.gain.setValueAtTime(1.2, ctx.currentTime);
    whooshGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+3.0);
    noise.connect(bandpass); bandpass.connect(whooshGain); whooshGain.connect(master);
    noise.start(); noise.stop(ctx.currentTime+3.5);

    const rumble = ctx.createOscillator();
    rumble.type = 'sawtooth';
    rumble.frequency.setValueAtTime(40, ctx.currentTime);
    rumble.frequency.exponentialRampToValueAtTime(180, ctx.currentTime+0.6);
    rumble.frequency.exponentialRampToValueAtTime(60, ctx.currentTime+2.5);
    const rumbleFilter = ctx.createBiquadFilter();
    rumbleFilter.type = 'lowpass'; rumbleFilter.frequency.value = 300;
    const rumbleGain = ctx.createGain();
    rumbleGain.gain.setValueAtTime(0.9, ctx.currentTime);
    rumbleGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+2.8);
    rumble.connect(rumbleFilter); rumbleFilter.connect(rumbleGain); rumbleGain.connect(master);
    rumble.start(); rumble.stop(ctx.currentTime+3.0);

    const whine = ctx.createOscillator();
    whine.type = 'sine';
    whine.frequency.setValueAtTime(300, ctx.currentTime);
    whine.frequency.exponentialRampToValueAtTime(3200, ctx.currentTime+0.9);
    whine.frequency.exponentialRampToValueAtTime(200, ctx.currentTime+1.8);
    const whineGain = ctx.createGain();
    whineGain.gain.setValueAtTime(0.0, ctx.currentTime);
    whineGain.gain.linearRampToValueAtTime(0.4, ctx.currentTime+0.3);
    whineGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+2.2);
    whine.connect(whineGain); whineGain.connect(master);
    whine.start(); whine.stop(ctx.currentTime+2.5);

    const crackBuf = ctx.createBuffer(1, ctx.sampleRate*0.15, ctx.sampleRate);
    const crackData = crackBuf.getChannelData(0);
    for(let i=0;i<crackData.length;i++) crackData[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.02));
    const crack = ctx.createBufferSource();
    crack.buffer = crackBuf;
    const crackGain = ctx.createGain(); crackGain.gain.value = 1.5;
    crack.connect(crackGain); crackGain.connect(master);
    crack.start(ctx.currentTime+0.05);

    setTimeout(()=>ctx.close(), 4000);
  }
</script>

   setTimeout(() => {
     removed.forEach(({ el, placeholder }) => {
       placeholder.parentNode.insertBefore(el, placeholder);
       placeholder.parentNode.removeChild(placeholder);
     });
   }, 10);
 }
</script>

  const _log = console.log;
  console.log = (...args) => {
    if (args.some(a => typeof a === 'string' && a.includes('translate.js'))) return;
    _log(...args);
  };
</script>
