<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stelno</title>

<link rel="icon" href="data:,">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#eee;
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}
#box{text-align:center}
#drop{
  border:2px dashed #444;
  padding:40px;
  border-radius:14px;
  transition:.2s;
}
#drop:hover{border-color:#888}
#status{margin-top:10px;font-size:14px;color:#aaa}
progress{width:100%;margin-top:10px}
</style>

</head>
<body>

<div id="box">
  <h2>Stelno ⚡</h2>
  <div id="drop">Drop file or click</div>
  <input type="file" id="f" hidden>
  <div id="status">Initializing...</div>
  <progress id="p" value="0" max="100"></progress>
</div>

<script type="module">
/* config */
const WS_URL = 'wss://stelno.onrender.com';
const HTTP = 'https://stelno.onrender.com';

/* room */
const r = location.hash.slice(1) || Math.random().toString(36).slice(2);
location.hash = r;

/* UI */
const s = document.getElementById('status');
const prog = document.getElementById('p');
const drop = document.getElementById('drop');
const f = document.getElementById('f');

/* state */
let dc, connected=false, fallbackMode=false;
let ws;
let q = [];

/* SAFE WS */
function connectWS(){
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    safeSend({join:r});
    flushQueue();
    s.textContent = 'Waiting for peer...';
  };

  ws.onclose = () => {
    s.textContent = 'Reconnecting...';
    setTimeout(connectWS, 1500);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = handleSignal;
}

/* safe send */
function safeSend(data){
  const msg = JSON.stringify(data);
  if(ws.readyState === WebSocket.OPEN){
    ws.send(msg);
  } else {
    q.push(msg);
  }
}

/* flush */
function flushQueue(){
  while(q.length && ws.readyState === WebSocket.OPEN){
    ws.send(q.shift());
  }
}

/* start WS */
connectWS();

/* WEBRTC */
const pc = new RTCPeerConnection({
  iceServers:[{urls:'stun:stun.l.google.com:19302'}]
});

/* create channel */
(async ()=>{
  dc = pc.createDataChannel('f');
  setup();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  safeSend({signal:offer});
})();

/* ICE */
pc.onicecandidate = e => {
  if(!e.candidate) return;
  safeSend({signal:e.candidate});
};

/* receive channel */
pc.ondatachannel = e => {
  dc = e.channel;
  setup();
};

/* signaling handler */
async function handleSignal(e){
  const d = JSON.parse(e.data);

  if(d.signal){
    if(d.signal.type==='offer'){
      await pc.setRemoteDescription(d.signal);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      safeSend({signal:answer});
    }
    else if(d.signal.type==='answer'){
      await pc.setRemoteDescription(d.signal);
    }
    else if(d.signal.candidate){
      await pc.addIceCandidate(d.signal);
    }
  }

  /* fallback receive */
  if(d.file){
    s.textContent = 'Receiving via fallback ☁️';

    const a = document.createElement('a');
    a.href = HTTP+'/f/'+d.file;
    a.download = 'file';
    a.click();
  }
}

/* fallback timer */
setTimeout(()=>{
  if(!connected){
    fallbackMode = true;
    s.textContent = 'Using secure fallback ☁️';
  }
},9000);

/* UI interactions */
drop.onclick = async () => {
  try{
    await navigator.clipboard.writeText(location.href);
    s.textContent = 'Link copied ✓';
  }catch(e){}
  f.click();
};

drop.ondragover = e => e.preventDefault();

drop.ondrop = e => {
  e.preventDefault();
  sendFile(e.dataTransfer.files[0]);
};

f.onchange = () => sendFile(f.files[0]);

/* DATA CHANNEL */
function setup(){

  dc.onopen = ()=>{
    connected = true;
    fallbackMode = false;
    s.textContent = 'Direct connection ⚡';
  };

  dc.onclose = ()=>{
    connected = false;
  };

  dc.onerror = ()=>{
    connected = false;
  };

  dc.onmessage = e => {
    s.textContent = 'Receiving via P2P ⚡';

    const blob = new Blob([e.data]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'file';
    a.click();
  };
}

/* SEND */
async function sendFile(file){
  if(!file) return;

  s.textContent='Preparing...';

  if(!connected && !fallbackMode){
    s.textContent='Connecting...';
    await new Promise(r=>setTimeout(r,2000));
  }

  s.textContent='Sending...';

  /* P2P */
  if(connected && !fallbackMode){
    const buf = await file.arrayBuffer();
    dc.send(buf);
    s.textContent='Sent via P2P ⚡';
  }

  /* fallback */
  else{
    s.textContent='Uploading... ☁️';

    const res = await fetch(HTTP,{
      method:'POST',
      body:file
    });

    const id = await res.text();

    safeSend({file:id});

    s.textContent='Sent via fallback ☁️';
  }
}
</script>

</body>
</html>
