<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stelno</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#eee;
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}
#box{text-align:center}
#drop{
  border:2px dashed #444;
  padding:40px;
  border-radius:14px;
  transition:.2s;
}
#drop:hover{border-color:#888}
#status{margin-top:10px;font-size:14px;color:#aaa}
progress{width:100%;margin-top:10px}
</style>

</head>
<body>

<div id="box">
  <h2>Stelno ⚡</h2>
  <div id="drop">Drop file or click</div>
  <input type="file" id="f" hidden>
  <div id="status">Initializing...</div>
  <progress id="p" value="0" max="100"></progress>
</div>

<script type="module">
/* config */
const WS = 'wss://stelno.onrender.com';
const HTTP = 'https://stelno.onrender.com';

/* room */
const r = location.hash.slice(1) || Math.random().toString(36).slice(2);
location.hash = r;

/* UI */
const s = document.getElementById('status');
const prog = document.getElementById('p');
const drop = document.getElementById('drop');
const f = document.getElementById('f');

/* state */
let dc, connected=false, fallbackMode=false;

/* socket */
const ws = new WebSocket(WS);
const q = [];

/* safe send */
const sendWS = d => {
  const m = JSON.stringify(d);
  if(ws.readyState===1) ws.send(m);
  else q.push(m);
};

ws.onopen = () => {
  sendWS({join:r});
  s.textContent = 'Waiting for peer...';
  while(q.length) ws.send(q.shift());
};

/* WEBRTC */
const pc = new RTCPeerConnection({
  iceServers:[{urls:'stun:stun.l.google.com:19302'}]
});

/* PERFECT NEGOTIATION */
let makingOffer = false;
const polite = Math.random() > 0.5;

/* create data channel once */
dc = pc.createDataChannel('f');
setup();

/* negotiation trigger */
pc.onnegotiationneeded = async () => {
  try{
    makingOffer = true;
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendWS({signal: pc.localDescription});
  } finally {
    makingOffer = false;
  }
};

/* receive channel */
pc.ondatachannel = e => {
  dc = e.channel;
  setup();
};

/* ICE */
pc.onicecandidate = e => {
  if(!e.candidate) return;
  sendWS({signal:e.candidate});
};

/* signaling */
ws.onmessage = async e => {
  const d = JSON.parse(e.data);

  if(d.signal){
    const offerCollision =
      d.signal.type === "offer" &&
      (makingOffer || pc.signalingState !== "stable");

    const ignoreOffer = !polite && offerCollision;
    if(ignoreOffer) return;

    if(d.signal.type === "offer"){
      await pc.setRemoteDescription(d.signal);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendWS({signal: pc.localDescription});
    }
    else if(d.signal.type === "answer"){
      if(pc.signalingState !== "have-local-offer") return;
      await pc.setRemoteDescription(d.signal);
    }
    else if(d.signal.candidate){
      try{ await pc.addIceCandidate(d.signal); }catch{}
    }
  }

  /* fallback receive */
  if(d.file){
    s.textContent = 'Receiving via fallback ☁️';

    const a = document.createElement('a');
    a.href = HTTP+'/f/'+d.file;
    a.download = 'file';
    a.click();
  }
};

</script>

</body>
</html>
