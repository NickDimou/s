<script>
window.STELNO.abortTransfer = (msg = 'Transfer cancelled ✕', notifyPeer = true) => {
  window.STELNO.state.cancelTransfer = true;
  clearTimeout(window.STELNO.state.timeoutTimer);

  if (window.STELNO.state.currentUpload) {
    window.STELNO.state.currentUpload.abort();
    window.STELNO.state.currentUpload = null;
  }

  window.STELNO.state.receivedChunks = [];
  window.STELNO.state.expectedChunks = 0;
  window.STELNO.state.fileMeta = null;
  window.STELNO.state.transferId = null;

  window.STELNO.UI.prog.value = 0;
  window.STELNO.UI.prog.style.display = 'none';
  window.STELNO.hideCancel();
  window.STELNO.hideXferInfo();
  window.STELNO.UI.s.textContent = msg;

  if (notifyPeer && window.STELNO.state.dc?.readyState === 'open') {
    try { window.STELNO.state.dc.send(JSON.stringify({ cancel: true })); } catch {}
  }
};

window.STELNO.enqueueFile = file => {
  if (!file) return;
  window.STELNO.state.fileQueue.push(file);
  window.STELNO.processQueue();
};

window.STELNO.processQueue = async () => {
  if (window.STELNO.state.sendingFile || !window.STELNO.state.fileQueue.length) return;
  window.STELNO.state.sendingFile = true;
  try { await window.STELNO.sendFile(window.STELNO.state.fileQueue.shift()); }
  finally { window.STELNO.state.sendingFile = false; window.STELNO.processQueue(); }
};

window.STELNO.setupDC = dc => {
  if (!dc) return;
  window.STELNO.UI.drop.style.pointerEvents = 'none';
  window.STELNO.UI.drop.style.opacity = 0.3;

  dc.onopen = () => {
    window.STELNO.state.connected = true;
    window.STELNO.state.fallbackMode = false;
    window.STELNO.UI.s.textContent = 'Direct connection ⚡';
    window.STELNO.setPeer('connected');
    window.STELNO.UI.drop.style.pointerEvents = '';
    window.STELNO.UI.drop.style.opacity = 1;
    window.STELNO.UI.qrPanel.classList.remove('open'); // ← add this
  };

  dc.onclose = () => {
    window.STELNO.state.connected = false;
    window.STELNO.setPeer('waiting');
    window.STELNO.UI.drop.style.pointerEvents = 'none';
    window.STELNO.UI.drop.style.opacity = 0.3;
    /* attempt reconnect */
    setTimeout(() => { if (!window.STELNO.state.connected) window.STELNO.initPeer(); }, 1000);
  };

  dc.onerror = () => { window.STELNO.state.connected = false; };

  dc.onmessage = async e => {
    try {
      if (typeof e.data === 'string') {
        const d = JSON.parse(e.data);
        if (d.cancel) { window.STELNO.abortTransfer('Peer cancelled transfer ✕', false); return; }

        window.STELNO.state.fileMeta = d;
        window.STELNO.state.receivedChunks = [];
        window.STELNO.state.expectedChunks = d.chunks;
        window.STELNO.state.transferId = d.transferId || Math.random().toString(36).slice(2);
        window.STELNO.state.rcvStartTime = Date.now();
        window.STELNO.state.cancelTransfer = false;
        window.STELNO.UI.prog.value = 0;
        window.STELNO.UI.prog.style.display = 'block';
        window.STELNO.showCancel();
        window.STELNO.UI.s.textContent = `Receiving ${window.STELNO.shortName(d.name)} via P2P ⚡`;
        return;
      }

      if (window.STELNO.state.cancelTransfer) return;

      window.STELNO.state.receivedChunks.push(e.data);
      window.STELNO.UI.prog.value = (window.STELNO.state.receivedChunks.length / window.STELNO.state.expectedChunks) * 100;

      const elapsed = (Date.now() - window.STELNO.state.rcvStartTime) / 1000 || 0.001;
      const rcvBytes = window.STELNO.state.receivedChunks.length * 16 * 1024;
      const speed = rcvBytes / elapsed;
      const remaining = ((window.STELNO.state.expectedChunks - window.STELNO.state.receivedChunks.length) * 16 * 1024) / speed;
      window.STELNO.showXferInfo(`↓ ${window.STELNO.fmtSpeed(speed)}  —  ${window.STELNO.fmtETA(remaining)}`);

      clearTimeout(window.STELNO.state.timeoutTimer);
      window.STELNO.state.timeoutTimer = setTimeout(() => window.STELNO.abortTransfer('Transfer timed out ⏱', false), 10000);

      if (window.STELNO.state.receivedChunks.length === window.STELNO.state.expectedChunks) {
        const blob = new Blob(window.STELNO.state.receivedChunks, { type: window.STELNO.state.fileMeta.type });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = window.STELNO.state.fileMeta.name;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);

        window.STELNO.UI.s.textContent = `Received ${window.STELNO.shortName(window.STELNO.state.fileMeta.name)} ✅`;
        window.STELNO.UI.prog.value = 0;
        window.STELNO.UI.prog.style.display = 'none';
        window.STELNO.hideCancel();
        window.STELNO.hideXferInfo();
      }
    } catch (err) { console.error(err); }
  };
};

/* restore sendFile */
window.STELNO.sendFile = async file => {
  if (!file) return;

  window.STELNO.state.cancelTransfer = false;

  const chunkSize = 16 * 1024;
  const buffer = await file.arrayBuffer();
  const chunks = Math.ceil(buffer.byteLength / chunkSize);

  /* generate transferId */
  const transferId = Math.random().toString(36).slice(2);
  window.STELNO.state.transferId = transferId;

  window.STELNO.UI.s.textContent = 'Preparing...';
  window.STELNO.UI.prog.value = 0;
  window.STELNO.UI.prog.style.display = 'block';
  window.STELNO.showCancel();
  window.STELNO.hideXferInfo();

  if (!window.STELNO.state.connected && !window.STELNO.state.fallbackMode) {
    await new Promise(r => setTimeout(r, 2000));
  }

  if (window.STELNO.state.cancelTransfer) {
    window.STELNO.UI.prog.style.display = 'none';
    window.STELNO.hideCancel();
    return;
  }

  window.STELNO.UI.s.textContent = 'Sending...';
  playSound();


  if (window.STELNO.state.connected && !window.STELNO.state.fallbackMode) {
    window.STELNO.state.dc.send(JSON.stringify({
      name: file.name,
      type: file.type,
      chunks,
      transferId
    }));

    let offset = 0;
    const startTime = Date.now();
    let lastUI = startTime;

    while (offset < buffer.byteLength) {

      if (window.STELNO.state.cancelTransfer) {
        window.STELNO.abortTransfer();
        return;
      }

      while (window.STELNO.state.dc.bufferedAmount > 16 * chunkSize) {
        await new Promise(r => setTimeout(r, 50));
      }

      window.STELNO.state.dc.send(buffer.slice(offset, offset + chunkSize));
      offset += chunkSize;

      window.STELNO.UI.prog.value = Math.min((offset / buffer.byteLength) * 100, 100);

      const now = Date.now();
      if (now - lastUI > 300) {
        const elapsed = (now - startTime) / 1000 || 0.001;
        const speed = offset / elapsed;
        const bytesLeft = buffer.byteLength - offset;
        window.STELNO.showXferInfo(`↑ ${window.STELNO.fmtSpeed(speed)}  —  ${window.STELNO.fmtETA(bytesLeft / speed)}`);
        lastUI = now;
      }
    }

    window.STELNO.UI.s.textContent = `Sent ${window.STELNO.shortName(file.name)} via P2P ⚡`;
    window.STELNO.UI.prog.value = 0;
    window.STELNO.UI.prog.style.display = 'none';
    window.STELNO.hideCancel();
    window.STELNO.hideXferInfo();
    return;
  }

  /* fallback unchanged */
  if (file.size > window.STELNO.MAX_FALLBACK_SIZE) {
    window.STELNO.UI.s.textContent = 'File too large for fallback ⚠️';
    window.STELNO.UI.prog.style.display = 'none';
    window.STELNO.hideCancel();
    return;
  }

  window.STELNO.UI.s.textContent = 'Uploading... ☁️';
  window.STELNO.state.currentUpload = new AbortController();

  try {
    const res = await fetch(window.STELNO.HTTP, {
      method: 'POST',
      body: file,
      signal: window.STELNO.state.currentUpload.signal
    });

    const id = await res.text();
    window.STELNO.sendWS({ file: id });
    window.STELNO.UI.s.textContent = 'Sent via fallback ☁️';

  } catch {
    window.STELNO.UI.s.textContent = window.STELNO.state.cancelTransfer
      ? 'Upload cancelled ✕'
      : 'Upload failed ✕';
  } finally {
    window.STELNO.state.currentUpload = null;
    window.STELNO.UI.prog.value = 0;
    window.STELNO.UI.prog.style.display = 'none';
    window.STELNO.hideCancel();
    window.STELNO.hideXferInfo();
  }
};
</script>

<script>
window.STELNO.initPeer = () => {
  const pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      {
        urls: 'turn:stun.cloudflare.com:3478',
        username: 'b4aae85474d13009d9e71f2a60fee4908f1da1f44ae3dec6d18d046238483e2360225ee6588',
        credential: 'aba9b169546eb6dcc7bfb1cdf34544cf95b5161d602e365fa7c8342b2e9802fb'
      }
    ]
  });

  window.STELNO.state.pc = pc;

  const restartIceWithBackoff = (attempt = 0) => {
    try {
      pc.restartIce();
    } catch {}
    if (attempt < 5) setTimeout(() => restartIceWithBackoff(attempt + 1), 1000 * Math.pow(2, attempt));
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') restartIceWithBackoff();
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') restartIceWithBackoff();
  };

  pc.onicecandidate = e => { if (e.candidate) window.STELNO.queueSignal({ signal: e.candidate }); };
  pc.onnegotiationneeded = async () => {
    if (window.STELNO.state.makingOffer) return; /* ← ADD THIS: drop if we're already mid-offer */

    try { window.STELNO.state.makingOffer = true; const offer = await pc.createOffer(); await pc.setLocalDescription(offer); window.STELNO.queueSignal({ signal: pc.localDescription }); }
    finally { window.STELNO.state.makingOffer = false; }
  };

  pc.ondatachannel = e => { window.STELNO.state.dc = e.channel; window.STELNO.setupDC(e.channel); };

  /* ── NEW: handle incoming media tracks from remote peer ── */
  pc.ontrack = e => {
    /* Always (re)create remoteStream so stale streams don't
       silently swallow new tracks after renegotiation */
    if (!window.STELNO.state.remoteStream) {
      window.STELNO.state.remoteStream = new MediaStream();
    }

    /* Avoid duplicate track additions on renegotiation */
    const existing = window.STELNO.state.remoteStream.getTracks();
    if (!existing.find(t => t.id === e.track.id)) {
      window.STELNO.state.remoteStream.addTrack(e.track);
    }

    /* Always reassign srcObject — even if the element already had one.
       This is what actually makes the video appear after renegotiation. */
    const remoteEl = document.getElementById('stelno-remote');
    if (remoteEl) {
      remoteEl.srcObject = window.STELNO.state.remoteStream;
      remoteEl.play().catch(() => {});
    }

    window.STELNO.onRemoteTrack?.(e.track, window.STELNO.state.remoteStream);
  };
  /* ── END NEW ── */

  window.STELNO.state.dc = pc.createDataChannel('f');
  window.STELNO.setupDC(window.STELNO.state.dc);
};
</script>











<!-- 4b: media channel helpers -->
<script>
window.STELNO.forceRenegotiate = async () => {
  const pc = window.STELNO.state.pc;
  if (!pc) return;
  try {
    window.STELNO.state.makingOffer = true;
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    window.STELNO.queueSignal({ signal: pc.localDescription });
  } catch (err) {
    console.error('STELNO renegotiate:', err);
  } finally {
    window.STELNO.state.makingOffer = false;
  }
};

/* ── internal: reuse transceivers if they exist, add if not ────────
   This is the core fix. addTransceiver on a live PC creates new
   m-lines. On the second startMedia() call we must reuse the
   existing transceivers via replaceTrack() to keep m-line order
   stable, which is what WebRTC requires.
──────────────────────────────────────────────────────────────────── */
window.STELNO._applyTracksToPC = async (stream) => {
  const pc = window.STELNO.state.pc;
  const tracks = stream.getTracks();

  for (const track of tracks) {
    const kind = track.kind; /* 'audio' or 'video' */

    /* Look for an existing inactive/sendrecv transceiver of same kind
       that we own (has a sender with a null or stopped track) */
    const existing = pc.getTransceivers().find(t =>
      t.receiver.track.kind === kind &&
      (t.sender.track === null || t.sender.track?.readyState === 'ended') &&
      t.stopped === false
    );

    if (existing) {
      /* Reuse — keeps m-line order intact */
      await existing.sender.replaceTrack(track);
      existing.direction = 'sendrecv';
    } else {
      /* First time — safe to add */
      pc.addTransceiver(track, { streams: [stream], direction: 'sendrecv' });
    }
  }

  await window.STELNO.forceRenegotiate();
};

window.STELNO.startMedia = async (constraints = { audio: true, video: true }) => {
  const pc = window.STELNO.state.pc;
  if (!pc) throw new Error('STELNO: peer connection not initialised');

  window.STELNO.state.makingOffer = true;
  window.STELNO.stopMedia({ renegotiate: false });

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch (err) {
    window.STELNO.state.makingOffer = false;
    window.STELNO.UI.s.textContent = 'Camera/mic access denied x';
    throw err;
  }

  /* Explicitly enable all tracks — macOS Chrome occasionally delivers
     tracks with enabled=false during the OS permission handshake */
  stream.getTracks().forEach(t => { t.enabled = true; });

  window.STELNO.state.localStream = stream;

  const localEl = document.getElementById('stelno-local');
  if (localEl) {
    localEl.srcObject = stream;
    localEl.muted = true;
    localEl.play().catch(() => {});
  }

  await window.STELNO._applyTracksToPC(stream);
  return stream;
};

window.STELNO.startScreen = async () => {
  const pc = window.STELNO.state.pc;
  if (!pc) throw new Error('STELNO: peer connection not initialised');

  window.STELNO.state.makingOffer = true; /* ← ADD */
  window.STELNO.stopScreen({ renegotiate: false });

  let stream;
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: false
    });
  } catch (err) {
    window.STELNO.state.makingOffer = false; /* ← ADD */
    window.STELNO.UI.s.textContent = 'Screen share cancelled ✕';
    throw err;
  }

  /* rest unchanged */
  window.STELNO.state.screenStream = stream;

  for (const track of stream.getTracks()) {
    track.onended = () => {
      window.STELNO.stopScreen({ renegotiate: true });
      const stopBtn = document.getElementById('btn-stop-media');
      if (stopBtn) stopBtn.style.display = 'none';
      const localVid = document.getElementById('stelno-local');
      if (localVid) { localVid.style.display = 'none'; localVid.srcObject = null; }
      window.STELNO.UI.s.textContent = 'Screen share ended';
    };
  }

  const localEl = document.getElementById('stelno-local');
  if (localEl) {
    localEl.srcObject = stream;
    localEl.muted = true;
    localEl.play().catch(() => {});
  }

  await window.STELNO._applyTracksToPC(stream);

  return stream;
};

/* ── stopMedia ──────────────────────────────────────────────────────
   replaceTrack(null) + direction='inactive' instead of removeTrack().
   This keeps m-lines in place — required by WebRTC spec.
──────────────────────────────────────────────────────────────────── */
window.STELNO.stopMedia = ({ renegotiate = true } = {}) => {
  const stream = window.STELNO.state.localStream;
  if (!stream) return;

  const pc = window.STELNO.state.pc;

  for (const track of stream.getTracks()) {
    track.stop();
    if (pc) {
      const transceiver = pc.getTransceivers().find(t => t.sender.track === track);
      if (transceiver) {
        transceiver.sender.replaceTrack(null).catch(() => {});
        transceiver.direction = 'inactive';
      }
    }
  }

  window.STELNO.state.localStream = null;

  const localEl = document.getElementById('stelno-local');
  if (localEl) localEl.srcObject = null;

  if (renegotiate) window.STELNO.forceRenegotiate();
};

window.STELNO.stopScreen = ({ renegotiate = true } = {}) => {
  const stream = window.STELNO.state.screenStream;
  if (!stream) return;

  const pc = window.STELNO.state.pc;

  for (const track of stream.getTracks()) {
    track.stop();
    if (pc) {
      const transceiver = pc.getTransceivers().find(t => t.sender.track === track);
      if (transceiver) {
        transceiver.sender.replaceTrack(null).catch(() => {});
        transceiver.direction = 'inactive';
      }
    }
  }

  window.STELNO.state.screenStream = null;

  const localEl = document.getElementById('stelno-local');
  if (localEl) localEl.srcObject = null;

  if (renegotiate) window.STELNO.forceRenegotiate();
};
</script>

<script>
window.STELNO.initWS = () => {
  let ws;
  let retry = 0;

  const connect = () => {
    ws = new WebSocket(window.STELNO.WS);
    window.STELNO.ws = ws;
    const q = [];

    window.STELNO.sendWS = d => {
      const m = JSON.stringify(d);
      if (ws.readyState === 1) ws.send(m);
      else q.push(m);
    };

    while (window.STELNO.pendingSignals.length) window.STELNO.sendWS(window.STELNO.pendingSignals.shift());

    ws.onopen = () => {
      retry = 0;
      window.STELNO.sendWS({ join: window.STELNO.room });
      window.STELNO.UI.s.textContent = 'Waiting for peer...';
      window.STELNO.setPeer('waiting');
      while (q.length) ws.send(q.shift());
      setInterval(() => { if (!window.STELNO.state.connected) window.STELNO.sendWS({ checkPeers: true }); }, 5000);
    };

    ws.onmessage = async e => {
      const d = JSON.parse(e.data);
      if (d.checkPeers && !window.STELNO.state.connected) {
        try { const offer = await window.STELNO.state.pc.createOffer(); await window.STELNO.state.pc.setLocalDescription(offer); window.STELNO.sendWS({ signal: window.STELNO.state.pc.localDescription }); } catch (err) { console.error(err); }
      }
      if (d.signal) {
        if (window.STELNO.UI.peerDot.dataset.state === 'waiting') {
          window.STELNO.setPeer('present');
          window.STELNO.UI.s.textContent = 'Peer found, connecting...';
        }

        const offerCollision = d.signal.type === 'offer' && (window.STELNO.state.makingOffer || window.STELNO.state.pc.signalingState !== 'stable');
        if (!window.STELNO.state.polite && offerCollision) return;

        if (d.signal.type === 'offer') { await window.STELNO.state.pc.setRemoteDescription(d.signal); const answer = await window.STELNO.state.pc.createAnswer(); await window.STELNO.state.pc.setLocalDescription(answer); window.STELNO.sendWS({ signal: window.STELNO.state.pc.localDescription }); }
        else if (d.signal.type === 'answer') { if (window.STELNO.state.pc.signalingState === 'have-local-offer') await window.STELNO.state.pc.setRemoteDescription(d.signal); }
        else if (d.signal.candidate) { try { await window.STELNO.state.pc.addIceCandidate(d.signal); } catch {} }
      }

      if (d.peerJoined && window.STELNO.UI.peerDot.dataset.state === 'waiting') {
        window.STELNO.setPeer('present');
        window.STELNO.UI.s.textContent = 'Peer joined the room 👋';
      }

      if (d.file) {
        window.STELNO.UI.s.textContent = 'Receiving via fallback ☁️';
        const a = document.createElement('a');
        a.href = window.STELNO.HTTP + '/f/' + d.file;
        a.download = 'file';
        a.click();
      }
    };

    ws.onclose = () => { setTimeout(() => connect(), Math.min(1000 * Math.pow(2, retry++), 30000)); };
    ws.onerror = () => { ws.close(); };
  };

  connect();
};
</script>

<script>
window.STELNO.queueSignal = d => {
  if (window.STELNO.ws && window.STELNO.ws.readyState === 1) {
    window.STELNO.ws.send(JSON.stringify(d));
  } else {
    window.STELNO.pendingSignals.push(d);

};

<script>
window.STELNO.initPeer();
window.STELNO.initWS();

window.STELNO.UI.cancelBtn.onclick = () => window.STELNO.abortTransfer('Transfer cancelled ✕', true);

window.STELNO.UI.drop.onclick = e => { if (window.STELNO.state.connected) window.STELNO.UI.f.click(); };
window.STELNO.UI.drop.ondragover = e => e.preventDefault();
window.STELNO.UI.drop.ondrop = e => {
  e.preventDefault();
  if (!window.STELNO.state.connected) return;
  for (const file of e.dataTransfer.files) window.STELNO.enqueueFile(file);
};

window.STELNO.UI.f.onchange = () => {
  if (!window.STELNO.state.connected) return;
  for (const file of window.STELNO.UI.f.files) window.STELNO.enqueueFile(file);
};

document.addEventListener('paste', e => {
  if (!window.STELNO.state.connected) return;
  const items = e.clipboardData?.items || [];
  for (const item of items) { if (item.kind === 'file') window.STELNO.enqueueFile(item.getAsFile()); }
});

setTimeout(() => {
  if (!window.STELNO.state.connected) {
    window.STELNO.state.fallbackMode = true;
    window.STELNO.UI.s.textContent = 'Using secure fallback ☁️';
  }
}, 30000);

window.addEventListener('beforeunload', () => {
  window.STELNO.abortTransfer('Page unloaded ✕', false);
});
window.addEventListener('pagehide', () => {
  window.STELNO.abortTransfer('Page hidden ✕', false);
});

/* ── media controls ── */
const mediaBar  = document.getElementById('media-bar');
const btnCam    = document.getElementById('btn-cam');
const btnMic    = document.getElementById('btn-mic');
const btnScreen = document.getElementById('btn-screen');
const btnStop   = document.getElementById('btn-stop-media');
const localVid  = document.getElementById('stelno-local');
const remoteVid = document.getElementById('stelno-remote');

/* ── Route incoming audio to dedicated <audio> element ──────────────
   ontrack in script 4 assigns to stelno-remote (video, inside hidden
   video-row). Some browsers block audio from hidden video elements.
   The onRemoteTrack hook fires after every ontrack — we use it to
   also pipe audio into a standalone <audio> element that is never
   hidden and has no autoplay visibility restriction.
──────────────────────────────────────────────────────────────────── */
window.STELNO.onRemoteTrack = (track, stream) => {
  if (track.kind === 'audio') {
    const audioEl = document.getElementById('stelno-remote-audio');
    if (audioEl) { audioEl.srcObject = stream; audioEl.play().catch(() => {}); }
  }
};

/* ── waveform ── */
let _waveFrame = null;
let _waveACtx  = null;

function startWaveform(stream) {
  stopWaveform();
  const canvas = document.getElementById('audio-wave');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  _waveACtx = new AudioContext();

  /* ── macOS Chrome fix ───────────────────────────────────────────
     AudioContext starts suspended if created outside a user gesture
     on some Chrome versions. The button click IS a gesture but the
     async getUserMedia await can lose that gesture context on macOS.
     Explicitly resume() to guarantee it runs.
  ──────────────────────────────────────────────────────────────── */
  _waveACtx.resume().catch(() => {});

  const analyser = _waveACtx.createAnalyser();
  analyser.fftSize = 512;
  _waveACtx.createMediaStreamSource(stream).connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);

  /* If the track starts muted (macOS timing), wait for unmute
     then reconnect the source so the waveform isn't flat */
  stream.getAudioTracks().forEach(track => {
    if (track.muted) {
      track.onunmute = () => {
        track.onunmute = null;
        try {
          _waveACtx.createMediaStreamSource(stream).connect(analyser);
        } catch {}
      };
    }
  });

  function draw() {
    _waveFrame = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const sw = canvas.width / buf.length;
    for (let i = 0; i < buf.length; i++) {
      const y = (buf[i] / 128) * (canvas.height / 2);
      i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * sw, y);
    }
    ctx.stroke();
  }
  draw();
}

function stopWaveform() {
  if (_waveFrame) { cancelAnimationFrame(_waveFrame); _waveFrame = null; }
  if (_waveACtx)  { _waveACtx.close().catch(() => {}); _waveACtx = null; }
  const canvas = document.getElementById('audio-wave');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

/* Show media bar only once data channel opens */
const _origSetupDC = window.STELNO.setupDC.bind(window.STELNO);
window.STELNO.setupDC = dc => {
  _origSetupDC(dc);
  const _origOpen = dc.onopen;
  dc.onopen = e => {
    _origOpen?.(e);
    mediaBar.style.display = 'flex';
  };
};

function showMediaUI() {
  document.getElementById('video-row').style.display = 'flex';
  btnStop.style.display = 'inline-block';
}

function showAudioUI(stream) {
  document.getElementById('audio-row').style.display = 'flex'; /* waveform row only — no video boxes */
  btnStop.style.display = 'inline-block';
  startWaveform(stream);
}

btnCam.onclick = async () => {
  try {
    await window.STELNO.startMedia({ audio: true, video: true });
    showMediaUI();
  } catch {}
};

btnMic.onclick = async () => {
  try {
    const stream = await window.STELNO.startMedia({ audio: true, video: false });
    showAudioUI(stream); /* ← waveform, not video-row */
  } catch {}
};

btnScreen.onclick = async () => {
  try {
    await window.STELNO.startScreen();
    showMediaUI();
  } catch {}
};

btnStop.onclick = () => {
  window.STELNO.stopMedia();
  window.STELNO.stopScreen();
  stopWaveform();
  document.getElementById('video-row').style.display = 'none';
  document.getElementById('audio-row').style.display = 'none';
  btnStop.style.display = 'none';
  const audioEl = document.getElementById('stelno-remote-audio');
  if (audioEl) audioEl.srcObject = null;
};
</script>

<script>
function playSound() {
  const c=new (window.AudioContext||window.webkitAudioContext)();
  const m=c.createGain(); /* master output */
  m.gain.setValueAtTime(0, c.currentTime);
  m.gain.linearRampToValueAtTime(0.75, c.currentTime+0.05);
  m.gain.exponentialRampToValueAtTime(0.001, c.currentTime+3.2);
  m.connect(c.destination);

  /* whoosh noise */
  const b=c.createBuffer(1, c.sampleRate*3.5, c.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const n=c.createBufferSource(); n.buffer=b;
  const f=c.createBiquadFilter(); f.type='bandpass';
  f.frequency.setValueAtTime(200,c.currentTime);
  f.frequency.exponentialRampToValueAtTime(4000,c.currentTime+1);
  f.frequency.exponentialRampToValueAtTime(800,c.currentTime+2);
  f.Q.value=0.8;
  const g=c.createGain(); g.gain.setValueAtTime(1.2,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+3);
  n.connect(f); f.connect(g); g.connect(m); n.start(); n.stop(c.currentTime+3.5);

  /* rumble */
  const r=c.createOscillator(); r.type='sawtooth';
  r.frequency.setValueAtTime(40,c.currentTime);
  r.frequency.exponentialRampToValueAtTime(180,c.currentTime+0.6);
  r.frequency.exponentialRampToValueAtTime(60,c.currentTime+2.5);
  const rf=c.createBiquadFilter(); rf.type='lowpass'; rf.frequency.value=300;
  const rg=c.createGain(); rg.gain.setValueAtTime(0.9,c.currentTime);
  rg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+2.8);
  r.connect(rf); rf.connect(rg); rg.connect(m); r.start(); r.stop(c.currentTime+3);

  /* whine */
  const w=c.createOscillator(); w.type='sine';
  w.frequency.setValueAtTime(300,c.currentTime);
  w.frequency.exponentialRampToValueAtTime(3200,c.currentTime+0.9);
  w.frequency.exponentialRampToValueAtTime(200,c.currentTime+1.8);
  const wg=c.createGain(); wg.gain.setValueAtTime(0,c.currentTime);
  wg.gain.linearRampToValueAtTime(0.4,c.currentTime+0.3);
  wg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+2.2);
  w.connect(wg); wg.connect(m); w.start(); w.stop(c.currentTime+2.5);

  /* crack */
  const cb=c.createBuffer(1,c.sampleRate*0.15,c.sampleRate);
  const cd=cb.getChannelData(0);
  for(let i=0;i<cd.length;i++) cd[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.02));
  const crack=c.createBufferSource(); crack.buffer=cb;
  const cg=c.createGain(); cg.gain.value=1.5;
  crack.connect(cg); cg.connect(m); crack.start(c.currentTime+0.05);

  setTimeout(()=>c.close(),4000); /* cleanup */
}
</script>

<script>
  function initTranslate() {
    translate.language.setLocal('english');
    translate.service.use('client.edge');
    translate.selectLanguageTag.show = false;

    const removed = [];
    document.querySelectorAll('.noTrans').forEach(el => {
      const placeholder = document.createComment('noTrans');
      el.parentNode.insertBefore(placeholder, el);
      el.parentNode.removeChild(el);
      removed.push({ el, placeholder });
    });

    const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    const langMap = {
      'zh':'chinese_simplified','zh-cn':'chinese_simplified','zh-tw':'chinese_traditional',
      'zh-hk':'chinese_traditional','es':'spanish','fr':'french','de':'german',
      'it':'italian','pt':'portuguese','ru':'russian','ja':'japanese','ko':'korean',
      'ar':'arabic','nl':'dutch','pl':'polish','tr':'turkish','vi':'vietnamese',
      'th':'thai','id':'indonesian','hi':'hindi','el':'greek',
    };
    const targetLang = langMap[browserLang] || langMap[browserLang.split('-')[0]];
    if (targetLang) translate.changeLanguage(targetLang);

    translate.execute();

    setTimeout(() => {
      removed.forEach(({ el, placeholder }) => {
        placeholder.parentNode.insertBefore(el, placeholder);
        placeholder.parentNode.removeChild(placeholder);
      });
    }, 10);
  }
</script>
