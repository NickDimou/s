<script type="module">
/* config */
const WS = 'wss://stelno.onrender.com';
const HTTP = 'https://stelno.onrender.com';

/* room */
const r = location.hash.slice(1) || Math.random().toString(36).slice(2);
location.hash = r;

/* auto-copy */
navigator.clipboard?.writeText(location.href);

/* UI */
const s = document.getElementById('status');
const prog = document.getElementById('p');

/* state */
let dc, connected=false, fallbackMode=false;

/* websocket */
const ws = new WebSocket(WS);

/* message queue (critical fix) */
let q = [];

/* safe send */
const send = d => {
  const msg = JSON.stringify(d);

  if (ws.readyState === 1) {
    ws.send(msg);
  } else {
    q.push(msg);
  }
};

/* flush queue */
ws.addEventListener('open', () => {
  send({join:r});
  q.forEach(m => ws.send(m));
  q = [];
  s.textContent = 'Waiting for peer...';
});

/* webrtc */
const pc = new RTCPeerConnection({
  iceServers:[{urls:'stun:stun.l.google.com:19302'}]
});

/* auto-connect */
(async ()=>{
  dc = pc.createDataChannel('f');
  setup();

  const o = await pc.createOffer();
  await pc.setLocalDescription(o);
  send({signal:o});
})();

/* fallback timer */
setTimeout(()=>{
  if(!connected){
    fallbackMode = true;
    s.textContent = 'Using secure fallback ☁️';
  }
},9000);

/* receive channel */
pc.ondatachannel = e => {
  dc = e.channel;
  setup();
};

/* ice */
pc.onicecandidate = e => {
  if(e.candidate)
    send({signal:e.candidate});
};

/* signaling */
ws.onmessage = async e => {
  const d = JSON.parse(e.data);

  if(d.signal){
    try{
      if(d.signal.type==='offer'){
        await pc.setRemoteDescription(d.signal);
        const a = await pc.createAnswer();
        await pc.setLocalDescription(a);
        send({signal:a});
      }

      else if(d.signal.type==='answer'){
        await pc.setRemoteDescription(d.signal);
      }

      else if(d.signal.candidate){
        await pc.addIceCandidate(d.signal);
      }
    }catch(err){
      /* prevent crash */
    }
  }

  /* fallback receive */
  if(d.file){
    s.textContent = 'Receiving via fallback ☁️';

    const a = document.createElement('a');
    a.href = HTTP+'/f/'+d.file;
    a.download = 'file';
    a.click();
  }
};

/* drag/drop */
drop.onclick = () => f.click();
drop.ondragover = e => e.preventDefault();

drop.ondrop = e => {
  e.preventDefault();
  sendFile(e.dataTransfer.files[0]);
};

f.onchange = () => sendFile(f.files[0]);

/* setup channel */
function setup(){

  dc.onopen = ()=>{
    connected = true;
    fallbackMode = false;
    s.textContent = 'Direct connection ⚡';
  };

  dc.onclose = ()=>{
    connected = false;
  };

  dc.onerror = ()=>{
    connected = false;
  };

  dc.onmessage = e => {
    s.textContent = 'Receiving via P2P ⚡';

    const blob = new Blob([e.data]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'file';
    a.click();
  };
}

/* send logic */
async function sendFile(file){
  if(!file) return;

  s.textContent='Preparing...';

  /* wait briefly for connection */
  if(!connected && !fallbackMode){
    s.textContent='Connecting...';
    await new Promise(r=>setTimeout(r,2000));
  }

  s.textContent='Sending...';

  /* P2P */
  if(connected && dc && dc.readyState==='open' && !fallbackMode){
    try{
      const b = await file.arrayBuffer();
      dc.send(b);
      s.textContent='Sent via P2P ⚡';
      return;
    }catch(e){
      fallbackMode = true;
    }
  }

  /* fallback */
  s.textContent='Uploading... ☁️';

  try{
    const res = await fetch(HTTP,{
      method:'POST',
      body:file
    });

    const id = await res.text();
    send({file:id});

    s.textContent='Sent via fallback ☁️';

  }catch(e){
    s.textContent='Upload failed ❌';
  }
}
</script>
